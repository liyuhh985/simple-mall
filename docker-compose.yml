version: '3.8'

services:
  nacos:
    image: nacos/nacos-server:v2.2.3
    container_name: nacos
    environment:
      MODE: standalone
    ports:
      - "8848:8848"
    networks:
      - mall-network

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    container_name: gateway
    ports:
      - "10010:10010"
    environment:
      - NACOS_ADDR=nacos:8848
    depends_on:
      - nacos
    networks:
      - mall-network

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: user-service
    ports:
      - "8081:8081"
    environment:
      - NACOS_ADDR=nacos:8848
    depends_on:
      - nacos
    networks:
      - mall-network

  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    container_name: order-service
    ports:
      - "8082:8081"
    environment:
      - NACOS_ADDR=nacos:8848
    depends_on:
      - nacos
    networks:
      - mall-network

networks:
  mall-network:
    driver: bridge
